version: '3.8'
services:
  qwen3-tts:
    build: .
    ports:
      - "${PORT:-7860}:7860"
    volumes:
      - ./resources:/app/server/resources
      - ./outputs:/app/server/outputs
    env_file: .env
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
